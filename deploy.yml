# Nome do Workflow
name: Deploy to Production

# --- Gatilhos (Triggers) ---
# Este workflow é acionado de forma segura:
# 1. Manualmente, através da aba "Actions" do GitHub (workflow_dispatch).
# 2. Automaticamente, quando uma nova tag no formato 'v*.*.*' (ex: v1.2.3) é criada na branch main.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

# Define permissões para o token do workflow para permitir login no registro de contêineres.
permissions:
  contents: read
  packages: write

# Jobs
# Um workflow é composto por um ou mais jobs.
jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # Fixando a versão em um commit SHA para maior segurança
        uses: actions/checkout@v4.1.7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.3.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5.5.1
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.5.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    name: Deploy Application
    # Protegendo o deploy com um ambiente que pode ter regras de aprovação e segredos próprios.
    environment: production
    runs-on: ubuntu-latest

    steps:
      - name: Execute remote deploy script
        # Fixando a versão em um commit SHA para maior segurança
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            set -e # Garante que o script pare em caso de erro

            # Define a imagem a ser usada, baseada no repositório do GitHub
            export IMAGE_TAG=ghcr.io/${{ github.repository }}:${{ github.ref_name }}

            # Navega para o diretório da aplicação
            cd /var/www/semarh-desktop

            # Faz login no GitHub Container Registry
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Puxa a imagem mais recente
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml pull app

            # Executa o script de deploy (que agora não precisa mais do artefato)
            ./deploy.sh
