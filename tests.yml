# Nome do Workflow
name: PHP CI

# --- Gatilhos (Triggers) ---
# Este workflow é acionado a cada push em um pull request direcionado à branch 'main'.
on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

# Jobs
jobs:
  test:
    name: Run PHPUnit Tests
    runs-on: ubuntu-latest

    # Etapa 1: Configurar o Serviço de Banco de Dados
    # Inicia um contêiner de serviço com o banco de dados PostGIS.
    # Os testes serão executados contra este banco de dados temporário.
    services:
      db:
        image: postgis/postgis:16-3.4-alpine
        # Variáveis de ambiente para o banco de dados de teste.
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: sail
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        # Opções para garantir que o banco de dados esteja pronto antes dos testes começarem.
        options: >-
          --health-cmd "pg_isready -U sail -d testing"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Etapa 2: Checkout do Código
      - name: Checkout repository
        uses: actions/checkout@v4.1.7

      # Etapa 3: Configurar o Ambiente PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, pdo_pgsql, bcmath, pcntl, zip, gd # Extensões do seu Dockerfile
          tools: composer:v2
          coverage: none # Desabilita a geração de cobertura, que não está sendo usada

      # Etapa 4: Cache das Dependências
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      # Etapa 5: Instalar Dependências
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      # Etapa 6: Preparar a Aplicação
      - name: Copy .env
        run: cp .env.example .env
      - name: Generate application key
        run: php artisan key:generate

      # Etapa 7: Executar os Testes
      - name: Run PHPUnit tests
        run: php artisan test
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: ${{ job.services.db.ports[5432] }}
          DB_DATABASE: testing
          DB_USERNAME: sail
          DB_PASSWORD: password

  lint:
    name: Run Code Style Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress
      - name: Run Laravel Pint
        run: ./vendor/bin/pint --test
